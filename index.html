<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODOアプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1 class="app-title">TODOアプリ</h1>
    </header>

    <main class="app-main">
      <section class="task-form">
        <label for="task-input" class="task-form-label">新しいタスク</label>
        <div class="task-form-row">
          <input
            type="text"
            id="task-input"
            class="task-input"
            placeholder="タスクを入力してください"
          >
          <button type="button" class="btn btn-add">追加</button>
        </div>
      </section>

      <section class="task-list-section">
        <h2 class="task-list-title">タスク一覧</h2>
        <ul class="task-list" id="task-list"></ul>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
