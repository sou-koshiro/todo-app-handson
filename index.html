<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODOアプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1 class="app-title">TODOアプリ</h1>
    </header>

    <main class="app-main">
      <section class="task-form">
        <label for="task-input" class="task-form-label">新しいタスク</label>
        <div class="task-form-row">
          <input
            type="text"
            id="task-input"
            class="task-input"
            placeholder="タスクを入力してください"
          >
          <button type="button" class="btn btn-add">追加</button>
        </div>
      </section>

      <section class="task-list-section">
        <h2 class="task-list-title">タスク一覧</h2>
        <ul class="task-list">

          <!-- 未完了タスク -->
          <li class="task-item">
            <label class="task-check">
              <input type="checkbox" class="task-checkbox">
              <span class="task-check-icon"></span>
            </label>
            <span class="task-text">買い物に行く</span>
            <div class="task-actions">
              <button type="button" class="btn btn-edit">編集</button>
              <button type="button" class="btn btn-delete">削除</button>
            </div>
          </li>

          <!-- 未完了タスク -->
          <li class="task-item">
            <label class="task-check">
              <input type="checkbox" class="task-checkbox">
              <span class="task-check-icon"></span>
            </label>
            <span class="task-text">レポートを提出する</span>
            <div class="task-actions">
              <button type="button" class="btn btn-edit">編集</button>
              <button type="button" class="btn btn-delete">削除</button>
            </div>
          </li>

          <!-- 完了済みタスク -->
          <li class="task-item is-completed">
            <label class="task-check">
              <input type="checkbox" class="task-checkbox" checked>
              <span class="task-check-icon"></span>
            </label>
            <span class="task-text">朝のランニング</span>
            <div class="task-actions">
              <button type="button" class="btn btn-edit">編集</button>
              <button type="button" class="btn btn-delete">削除</button>
            </div>
          </li>

          <!-- 完了済みタスク -->
          <li class="task-item is-completed">
            <label class="task-check">
              <input type="checkbox" class="task-checkbox" checked>
              <span class="task-check-icon"></span>
            </label>
            <span class="task-text">メールの返信</span>
            <div class="task-actions">
              <button type="button" class="btn btn-edit">編集</button>
              <button type="button" class="btn btn-delete">削除</button>
            </div>
          </li>

        </ul>
      </section>
    </main>
  </div>
</body>
</html>
